<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Founder Decision Journal - Log and track your startup decisions.">
    <title>Founder Decision Journal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="nav-container">
            <a href="#" class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
                Founder Decision Journal
            </a>
        </div>
    </header>

    <main>
        <div class="app-container">
            <!-- Form Section -->
            <section class="form-section">
                <h1>Log a Decision</h1>
                <form id="decisionForm">
                    <div class="form-group">
                        <label for="founderName">Founder Name</label>
                        <input type="text" id="founderName" placeholder="Your name" required>
                    </div>

                    <div class="form-group">
                        <label for="company">Company</label>
                        <input type="text" id="company" placeholder="Company name" required>
                    </div>

                    <div class="form-group">
                        <label for="decision">Decision</label>
                        <textarea id="decision" placeholder="Describe your decision..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select a category</option>
                            <option value="Product">Product</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Hiring">Hiring</option>
                            <option value="Pricing">Pricing</option>
                            <option value="Strategic Pivot">Strategic Pivot</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary btn-large">Save Decision</button>
                </form>
            </section>

            <!-- Decisions List Section -->
            <section class="decisions-section">
                <h2>Your Decisions</h2>
                <div id="decisionsList" class="decisions-list">
                    <p class="empty-state">No decisions logged yet. Create one above!</p>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-container">
            <p>&copy; 2026 Founder Decision Journal. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>

</body>

</html>
